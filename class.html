<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AIoT 控制面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 基礎重置 - 嚴格對齊 Index */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, sans-serif;
            background-color: #1a1a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('./Bg_JackalAIoT.jpg') no-repeat center center;
            background-size: cover; z-index: -1;
        }

        /* 關鍵占位區：確保內容下移 */
        .top-padding-spacer {
            width: 100%;
            height: 410px; 
        }

        /* --- 零延時觸控樣式 --- */
        .tap-target {
            position: relative;
            overflow: hidden;
            transition: transform 0.05s linear;
        }
        .tap-target::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.05s linear;
            pointer-events: none;
            z-index: 2;
        }
        .tapped {
            transform: scale(0.96) !important;
        }
        .tapped::after {
            background: rgba(255, 255, 255, 0.4) !important;
        }

        /* 容器樣式 - 對齊 Index 卡片效果 */
        .container { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 20px; 
            border-radius: 20px; 
            width: 90%; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            text-align: center; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            margin-bottom: 100px;
        }

        h2 { font-size: 20px; margin-bottom: 20px; color: #4a90e2; }

        /* UI 元素樣式 */
        .ui-element { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; outline: none; }
        
        .btn { cursor: pointer; font-weight: 600; color: white; display: block; text-decoration: none; }
        .btn-blue { background: rgba(74, 144, 226, 0.8); border: 1px solid rgba(255,255,255,0.2); }
        
        /* 圖片顯示區域樣式 */
        .image-display {
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed #4a90e2;
            border-radius: 12px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
        }
        .image-display img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
        }

        /* 新增：文件上傳區域樣式 (與test.html一致) */
        .upload-section { 
            margin-top: 15px; 
            padding-top: 15px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
        }
        .file-label { 
            display: block; 
            background: rgba(255,255,255,0.1); 
            padding: 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.2); 
            font-size: 14px; 
            color: #fff; 
        }

        /* 底部導航欄 - 嚴格對齊 Index */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            width: 92%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            height: 60px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15), 0 10px 20px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .nav-item {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 80%;
            border-radius: 20px;
        }
        .nav-item.active { color: #007aff; }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; }
    </style>
</head>
<body>
    <div class="top-padding-spacer"></div>

    <div class="container">
        <h2>AIoT 圖片展示區</h2>
        <!-- 圖片顯示區域 -->
        <div id="imageContainer" class="image-display">
            <span style="color: #4a90e2;">未加載圖片</span>
        </div>
        <!-- 加載圖片按鈕 (UI與原按鈕一致) -->
        <button class="ui-element btn btn-blue tap-target" onclick="loadImage()">加載本機圖片</button>
        
        <!-- 新增：文件上傳區域 (與test.html功能一致) -->
        <div class="upload-section">
            <label class="file-label tap-target" for="fileInput"><i class="fas fa-cloud-upload-alt"></i> 選擇文件...</label>
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile(this.files[0])">
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item tap-target"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="alerts.html" class="nav-item tap-target"><i class="fas fa-bell"></i><span>Alerts</span></a>
        <div class="nav-item tap-target"><i class="fas fa-user"></i><span>Profile</span></div>
        <div class="nav-item tap-target"><i class="fas fa-cog"></i><span>Settings</span></div>
        <a href="about.html" class="nav-item tap-target"><i class="fas fa-info-circle"></i><span>About</span></a>
    </nav>

    <script>
        // --- 零延時觸控邏輯 ---
        const targets = document.querySelectorAll('.tap-target');
        targets.forEach(btn => {
            btn.addEventListener('touchstart', function() { this.classList.add('tapped'); }, { passive: true });
            const removeEffect = () => { setTimeout(() => btn.classList.remove('tapped'), 100); };
            btn.addEventListener('touchend', removeEffect);
            btn.addEventListener('touchcancel', removeEffect);
            btn.addEventListener('mousedown', () => btn.classList.add('tapped'));
            btn.addEventListener('mouseup', removeEffect);
        });

        // 動態判斷部署環境，自動切換API地址
        // const isLocal = window.location.hostname === 'localhost' || 
        //                 window.location.hostname === '127.0.0.1' || 
        //                 window.location.hostname === '172.20.10.3';
        // const API_URL = isLocal ? "http://172.20.10.3:8000" : "https://jackalchiu.onrender.com";
        const API_URL = '';   // 使用相對路徑（推薦）

        // 加載圖片函數 (修改：添加隨機參數避免緩存)
        async function loadImage() {
            try {
                // 新增：添加時間戳隨機參數，強制跳過緩存
                const timestamp = new Date().getTime();
                const response = await fetch(`${API_URL}/get-image?timestamp=${timestamp}`, {
                    method: 'GET',
                    headers: { 
                        'Content-Type': 'application/json',
                        // 加強緩存控制
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    },
                    // 新增：明確告訴瀏覽器不使用緩存
                    cache: 'no-cache'
                });
                
                if (!response.ok) throw new Error("圖片加載失敗");
                
                // 轉換為Blob並創建圖片URL
                const blob = await response.blob();
                const imageUrl = URL.createObjectURL(blob);
                
                // 更新圖片顯示區域
                const imageContainer = document.getElementById('imageContainer');
                imageContainer.innerHTML = `<img src="${imageUrl}" alt="Jackal Icon">`;
                
            } catch (e) { 
                console.error(e);
                alert("圖片加載失敗: " + e.message);
                // 重置顯示區域
                document.getElementById('imageContainer').innerHTML = '<span style="color: #4a90e2;">加載失敗</span>';
            }
        }

        // 新增：文件上傳成功後自動重新加載圖片（優化體驗，非必須）
        async function uploadFile(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            try {
                await fetch(`${API_URL}/upload`, { 
                    method: 'POST', 
                    body: formData,
                    cache: 'no-cache'
                });
                alert("文件上傳成功");
                // 新增：上傳成功後自動加載最新圖片
                loadImage();
                // 重置文件選擇框
                document.getElementById('fileInput').value = '';
            } catch (e) { alert("上傳失敗"); }
        }
    </script>
</body>
</html>
