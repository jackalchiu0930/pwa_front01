<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AIoT 控制面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 保持你的 Glassmorphism 風格 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, sans-serif;
            background-color: #1a1a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('./Bg_JackalAIoT.jpg') no-repeat center center;
            background-size: cover; z-index: -1;
        }

        .top-padding-spacer { width: 100%; height: 100px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
            text-align: center;
        }

        .number-display {
            font-size: 48px;
            font-weight: bold;
            color: #4facfe;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            padding: 12px 25px;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        .input-group { margin-top: 20px; text-align: left; }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="top-padding-spacer"></div>

    <div class="glass-card">
        <h3>隨機數請求測試</h3>
        <div class="number-display" id="numberDisplay">--</div>
        <button class="btn" onclick="getNewNumber()">刷新隨機數</button>
    </div>

    <div class="glass-card">
        <h3>資料提交測試</h3>
        <div class="input-group">
            <label>測試備註</label>
            <input type="text" id="userDataInput" placeholder="輸入一些文字...">
        </div>
        <button class="btn" onclick="submitUserData()">提交資料</button>
    </div>

    <script>
        // 自動偵測當前網域，避免寫死 http 或 localhost
        const API_URL = window.location.origin;

        async function getNewNumber() {
            const display = document.getElementById('numberDisplay');
            display.innerText = "⏳";
            try {
                // 使用絕對路徑確保在 PWA 模式下路徑正確
                const res = await fetch(`${API_URL}/list`, {
                    method: 'GET',
                    cache: 'no-cache'
                });
                
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                
                const data = await res.json();
                display.innerText = data;
            } catch (e) { 
                console.error("API Error:", e);
                display.innerText = "ERR";
                alert("獲取失敗: " + e.message); 
            }
        }

        async function submitUserData() {
            const val = document.getElementById('userDataInput').value;
            if (!val) return;
            try {
                const res = await fetch(`${API_URL}/list`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note: val }),
                    cache: 'no-cache'
                });
                
                if (!res.ok) throw new Error(`Status: ${res.status}`);
                
                alert("提交成功");
                document.getElementById('userDataInput').value = '';
            } catch (e) { 
                console.error("Submit Error:", e);
                alert("提交失敗: " + e.message); 
            }
        }
    </script>
</body>
</html>
