<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AIoT 菜單頁面 - menu02</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- 引入QR Code解析庫 -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <style>
        /* 基礎重置 - 嚴格對齊 test.html */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, sans-serif;
            background-color: #1a1a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('./Bg_JackalAIoT.jpg') no-repeat center center;
            background-size: cover; z-index: -1;
        }

        /* 關鍵占位區：確保內容下移 */
        .top-padding-spacer {
            width: 100%;
            height: 410px; 
        }

        /* --- 零延時觸控樣式 --- */
        .tap-target {
            position: relative;
            overflow: hidden;
            transition: transform 0.05s linear;
        }
        .tap-target::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.05s linear;
            pointer-events: none;
            z-index: 2;
        }
        .tapped {
            transform: scale(0.96) !important;
        }
        .tapped::after {
            background: rgba(255, 255, 255, 0.4) !important;
        }

        /* 容器樣式 - 對齊 test.html 卡片效果 */
        .container { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 20px; 
            border-radius: 20px; 
            width: 90%; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            text-align: center; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            margin-bottom: 100px;
        }

        h2 { font-size: 20px; margin-bottom: 20px; color: #4a90e2; }

        /* UI 元素樣式 - 與 test.html 一致 */
        .ui-element { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; outline: none; }

        .btn { cursor: pointer; font-weight: 600; color: white; display: block; text-decoration: none; }
        .btn-blue { background: rgba(74, 144, 226, 0.8); border: 1px solid rgba(255,255,255,0.2); }
        .btn-green { background: rgba(76, 175, 80, 0.8); border: 1px solid rgba(255,255,255,0.2); }
        .btn-red { background: rgba(244, 67, 54, 0.8); border: 1px solid rgba(255,255,255,0.2); }
        .btn-orange { background: rgba(255, 152, 0, 0.8); border: 1px solid rgba(255,255,255,0.2); }

        .display-box { background: rgba(0, 0, 0, 0.2); border: 1px dashed #4a90e2; color: #4a90e2; font-size: 28px; font-weight: bold; min-height: 65px; display: flex; justify-content: center; align-items: center; }

        .upload-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .file-label { display: block; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); font-size: 14px; color: #fff; }

        /* 底部導航欄 - 嚴格對齊 test.html */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            width: 92%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            height: 60px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15), 0 10px 20px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .nav-item {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 80%;
            border-radius: 20px;
        }
        .nav-item.active { color: #007aff; }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; }

        /* 圖片上傳掃碼區域樣式 */
        .scan-upload-section {
            margin-top: 15px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            border: 2px dashed rgba(76, 175, 80, 0.5);
        }

        .scan-upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            cursor: pointer;
            color: rgba(255,255,255,0.9);
        }

        .scan-upload-label i {
            font-size: 48px;
            color: #4caf50;
            margin-bottom: 15px;
        }

        .scan-upload-label .main-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .scan-upload-label .sub-text {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        .scan-preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }

        .scan-result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .scan-success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            color: #4caf50;
        }

        .scan-error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            color: #ff6b6b;
        }

        .scan-loading {
            display: none;
            margin-top: 15px;
        }

        .scan-loading i {
            font-size: 24px;
            color: #4a90e2;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 重試按鈕 */
        .retry-btn {
            background: rgba(74, 144, 226, 0.8) !important;
            margin-top: 10px !important;
        }

        /* 新增：快捷操作區域 */
        .quick-actions {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .quick-actions-title {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
            text-align: left;
        }

        /* 新增：歷史工號快速選擇區 */
        .history-section {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            display: none;
        }

        .history-section.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .history-title {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
        }

        .history-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .history-chip {
            background: rgba(255, 152, 0, 0.3);
            border: 1px solid rgba(255, 152, 0, 0.5);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-chip:hover {
            background: rgba(255, 152, 0, 0.6);
        }

        .history-chip i {
            font-size: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

<body>
    <div class="top-padding-spacer"></div>

        <h2>AIoT 菜單頁面 - menu02</h2>

        <!-- 按鈕3：課堂簽到 -->

            <i class="fas fa-qrcode"></i> 課堂掃碼簽到
        </button>

        <!-- 新增：查看簽到日曆按鈕 -->
        <button class="ui-element btn btn-orange tap-target" onclick="viewCalendar()">
            <i class="fas fa-calendar-alt"></i> 查看簽到日曆
        </button>

        <!-- 新增：歷史工號快速查看區域 -->
        <div class="history-section" id="historySection">
            <div class="history-title"><i class="fas fa-history"></i> 快速查看歷史工號：</div>
            <div class="history-chips" id="historyChips"></div>
        </div>

        <button class="ui-element btn btn-blue tap-target">按鈕4 - 暫無功能</button>

        <!-- 圖片上傳掃碼區域（初始隱藏） -->
        <div class="scan-upload-section" id="scanSection" style="display: none;">
            <input type="file" id="qrInput" accept="image/*" capture="environment" style="display: none;" onchange="handleQRImage(this)">
            <label for="qrInput" class="scan-upload-label tap-target" id="uploadLabel">
                <i class="fas fa-camera"></i>
                <span class="main-text">點擊拍照或選擇圖片</span>
                <span class="sub-text">請拍攝課堂QR Code進行簽到</span>
            </label>

            <div class="scan-loading" id="scanLoading">
                <i class="fas fa-spinner"></i>
                <p style="margin-top: 10px; color: rgba(255,255,255,0.8);">正在識別QR Code...</p>
            </div>

            <img class="scan-preview" id="scanPreview" alt="預覽">

            <div class="scan-result" id="scanResult"></div>

            <!-- 重試按鈕（識別失敗時顯示） -->
            <button class="ui-element btn retry-btn tap-target" id="retryBtn" onclick="retryScan()" style="display: none;">
                <i class="fas fa-redo"></i> 重新拍攝
            </button>

            <button class="ui-element btn btn-red tap-target" onclick="hideScanSection()" style="margin-top: 15px;">
                <i class="fas fa-times"></i> 取消
            </button>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" onclick="localStorage.setItem('from_internal_nav', 'true');" class="nav-item tap-target"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="alerts.html" class="nav-item tap-target"><i class="fas fa-bell"></i><span>Alerts</span></a>
        <div class="nav-item tap-target"><i class="fas fa-user"></i><span>Profile</span></div>
        <div class="nav-item tap-target"><i class="fas fa-cog"></i><span>Settings</span></div>
        <a href="about.html" class="nav-item tap-target"><i class="fas fa-info-circle"></i><span>About</span></a>
    </nav>

    <script>
        // --- 零延時觸控邏輯 ---
        const targets = document.querySelectorAll('.tap-target');
        targets.forEach(btn => {
            btn.addEventListener('touchstart', function() { this.classList.add('tapped'); }, { passive: true });
            const removeEffect = () => { setTimeout(() => btn.classList.remove('tapped'), 100); };
            btn.addEventListener('touchend', removeEffect);
            btn.addEventListener('touchcancel', removeEffect);
            btn.addEventListener('mousedown', () => btn.classList.add('tapped'));
            btn.addEventListener('mouseup', removeEffect);
        });

        // API地址配置
        // const isLocal = window.location.hostname === 'localhost' || 
        //                 window.location.hostname === '127.0.0.1' || 
        //                 window.location.hostname === '172.20.10.3';
        // const API_URL = isLocal ? "http://172.20.10.3:8000" : "https://jackalchiu.onrender.com";
        const API_URL = '';   // 使用相對路徑（推薦）

        // 初始化：檢查是否有歷史工號
        window.onload = function() {
            loadHistorySection();
        };

        // 載入歷史工號區域
        function loadHistorySection() {
            const history = JSON.parse(localStorage.getItem('employeeHistory') || '[]');
            const historySection = document.getElementById('historySection');
            const historyChips = document.getElementById('historyChips');

            if (history.length > 0) {
                historySection.classList.add('show');
                historyChips.innerHTML = history.map(id => 
                    `<span class="history-chip tap-target" onclick="quickViewCalendar('${id}')">
                        <i class="fas fa-user"></i> ${id}
                    </span>`
                ).join('');
                // 重新綁定觸控效果
                document.querySelectorAll('.history-chip').forEach(btn => {
                    btn.addEventListener('touchstart', function() { this.classList.add('tapped'); }, { passive: true });
                    const removeEffect = () => { setTimeout(() => this.classList.remove('tapped'), 100); };
                    btn.addEventListener('touchend', removeEffect);
                    btn.addEventListener('touchcancel', removeEffect);
                });
            }
        }

        // 快速查看歷史工號的日曆
        function quickViewCalendar(employeeId) {
            localStorage.setItem('currentEmployeeId', employeeId);
            window.location.href = 'classsful.html';
        }

        // 顯示掃碼區域
        function showScanSection() {
            document.getElementById('scanSection').style.display = 'block';
            // 自動觸發文件選擇（iOS上會直接打開相機）
            setTimeout(() => {
                document.getElementById('qrInput').click();
            }, 100);
        }

        // 隱藏掃碼區域
        function hideScanSection() {
            document.getElementById('scanSection').style.display = 'none';
            document.getElementById('scanPreview').style.display = 'none';
            document.getElementById('scanResult').style.display = 'none';
            document.getElementById('scanResult').className = 'scan-result';
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('uploadLabel').style.display = 'flex';
            document.getElementById('qrInput').value = '';
        }

        // 重試掃描
        function retryScan() {
            document.getElementById('qrInput').value = '';
            document.getElementById('qrInput').click();
        }

        // 查看簽到日曆（新增功能）
        function viewCalendar() {
            // 檢查是否有當前工號
            const currentEmployeeId = localStorage.getItem('currentEmployeeId');

            if (currentEmployeeId && currentEmployeeId.length === 8) {
                // 有工號，直接跳轉
                window.location.href = 'classsful.html';
            } else {
                // 沒有工號，跳轉到日曆頁面讓用戶輸入
                window.location.href = 'classsful.html';
            }
        }

        // 【核心】增強版QR Code解析函數
        function decodeQRCode(imageData, width, height) {
            // 1. 嘗試原始圖像解析
            let code = jsQR(imageData.data, width, height, {
                inversionAttempts: "attemptBoth"
            });

            if (code) return code;

            // 2. 嘗試灰度處理後解析
            const grayData = convertToGrayscale(imageData.data, width, height);
            code = jsQR(grayData, width, height, {
                inversionAttempts: "attemptBoth"
            });

            if (code) return code;

            // 3. 嘗試二值化處理（自適應閾值）
            const binaryData = applyAdaptiveThreshold(grayData, width, height);
            code = jsQR(binaryData, width, height, {
                inversionAttempts: "attemptBoth"
            });

            if (code) return code;

            // 4. 嘗試反色後解析（處理黑底白碼的情況）
            const invertedData = invertColors(imageData.data);
            code = jsQR(invertedData, width, height, {
                inversionAttempts: "attemptBoth"
            });

            if (code) return code;

            // 5. 嘗試縮放後解析（處理高分辨率圖片）
            if (width > 1000 || height > 1000) {
                const scale = 0.5;
                const newWidth = Math.floor(width * scale);
                const newHeight = Math.floor(height * scale);
                const scaledData = resizeImage(imageData.data, width, height, newWidth, newHeight);
                code = jsQR(scaledData, newWidth, newHeight, {
                    inversionAttempts: "attemptBoth"
                });
            }

            return code;
        }

        // 轉換為灰度
        function convertToGrayscale(data, width, height) {
            const gray = new Uint8ClampedArray(width * height * 4);
            for (let i = 0; i < data.length; i += 4) {
                const luminance = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                gray[i] = gray[i + 1] = gray[i + 2] = luminance;
                gray[i + 3] = 255;
            }
            return gray;
        }

        // 自適應閾值二值化
        function applyAdaptiveThreshold(grayData, width, height) {
            const binary = new Uint8ClampedArray(width * height * 4);
            const blockSize = 15;
            const C = 10;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let sum = 0, count = 0;

                    // 計算局部區域平均值
                    for (let dy = -blockSize; dy <= blockSize; dy++) {
                        for (let dx = -blockSize; dx <= blockSize; dx++) {
                            const ny = y + dy;
                            const nx = x + dx;
                            if (ny >= 0 && ny < height && nx >= 0 && nx < width) {
                                sum += grayData[(ny * width + nx) * 4];
                                count++;
                            }
                        }
                    }

                    const threshold = sum / count - C;
                    const idx = (y * width + x) * 4;
                    const value = grayData[idx] > threshold ? 255 : 0;
                    binary[idx] = binary[idx + 1] = binary[idx + 2] = value;
                    binary[idx + 3] = 255;
                }
            }
            return binary;
        }

        // 反色處理
        function invertColors(data) {
            const inverted = new Uint8ClampedArray(data.length);
            for (let i = 0; i < data.length; i += 4) {
                inverted[i] = 255 - data[i];       // R
                inverted[i + 1] = 255 - data[i + 1]; // G
                inverted[i + 2] = 255 - data[i + 2]; // B
                inverted[i + 3] = data[i + 3];       // Alpha
            }
            return inverted;
        }

        // 縮放圖片
        function resizeImage(data, srcWidth, srcHeight, dstWidth, dstHeight) {
            const scaled = new Uint8ClampedArray(dstWidth * dstHeight * 4);
            const xRatio = srcWidth / dstWidth;
            const yRatio = srcHeight / dstHeight;

            for (let y = 0; y < dstHeight; y++) {
                for (let x = 0; x < dstWidth; x++) {
                    const srcX = Math.floor(x * xRatio);
                    const srcY = Math.floor(y * yRatio);
                    const srcIdx = (srcY * srcWidth + srcX) * 4;
                    const dstIdx = (y * dstWidth + x) * 4;

                    scaled[dstIdx] = data[srcIdx];
                    scaled[dstIdx + 1] = data[srcIdx + 1];
                    scaled[dstIdx + 2] = data[srcIdx + 2];
                    scaled[dstIdx + 3] = data[srcIdx + 3];
                }
            }
            return scaled;
        }

        // 處理上傳的圖片
        function handleQRImage(input) {
            const file = input.files[0];
            if (!file) return;

            // 顯示加載狀態
            document.getElementById('scanLoading').style.display = 'block';
            document.getElementById('scanResult').style.display = 'none';
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('uploadLabel').style.display = 'none';

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // 顯示預覽
                    const preview = document.getElementById('scanPreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';

                    // 使用Canvas處理圖片
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // 限制最大尺寸以提高性能
                    const maxSize = 1200;
                    let width = img.width;
                    let height = img.height;

                    if (width > maxSize || height > maxSize) {
                        if (width > height) {
                            height = (height / width) * maxSize;
                            width = maxSize;
                        } else {
                            width = (width / height) * maxSize;
                            height = maxSize;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                    // 使用增強版解析函數
                    const code = decodeQRCode(imageData, canvas.width, canvas.height);

                    // 隱藏加載
                    document.getElementById('scanLoading').style.display = 'none';

                    const resultDiv = document.getElementById('scanResult');

                    if (code) {
                        console.log("QR Code內容:", code.data);

                        // 檢查是否包含classjoin.html
                        if (code.data.includes('classjoin.html')) {
                            resultDiv.className = 'scan-result scan-success';
                            resultDiv.innerHTML = '<i class="fas fa-check-circle"></i> 識別成功！即將跳轉...';
                            resultDiv.style.display = 'block';

                            // 延遲跳轉，讓用戶看到成功提示
                            setTimeout(() => {
                                window.location.href = code.data;
                            }, 1500);
                        } else {
                            resultDiv.className = 'scan-result scan-error';
                            resultDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> 無效的課堂QR Code<br><small>內容: ' + code.data.substring(0, 50) + '</small>';
                            resultDiv.style.display = 'block';
                            document.getElementById('retryBtn').style.display = 'block';
                        }
                    } else {
                        resultDiv.className = 'scan-result scan-error';
                        resultDiv.innerHTML = '<i class="fas fa-times-circle"></i> 未能識別QR Code<br><small>提示：請確保QR Code清晰、光線充足，或嘗試重新拍攝</small>';
                        resultDiv.style.display = 'block';
                        document.getElementById('retryBtn').style.display = 'block';
                    }
                };

                img.onerror = function() {
                    document.getElementById('scanLoading').style.display = 'none';
                    const resultDiv = document.getElementById('scanResult');
                    resultDiv.className = 'scan-result scan-error';
                    resultDiv.innerHTML = '<i class="fas fa-times-circle"></i> 圖片加載失敗';
                    resultDiv.style.display = 'block';
                    document.getElementById('retryBtn').style.display = 'block';
                };

                img.src = e.target.result;
            };

            reader.onerror = function() {
                document.getElementById('scanLoading').style.display = 'none';
                const resultDiv = document.getElementById('scanResult');
                resultDiv.className = 'scan-result scan-error';
                resultDiv.innerHTML = '<i class="fas fa-times-circle"></i> 文件讀取失敗';
                resultDiv.style.display = 'block';
                document.getElementById('retryBtn').style.display = 'block';
            };

            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
