<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>課堂掃碼簽到 - AIoT Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, sans-serif;
            background-color: #1a1a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('./Bg_JackalAIoT.jpg') no-repeat center center;
            background-size: cover; z-index: -1;
        }

        .top-padding-spacer { width: 100%; height: 410px; }

        .tap-target {
            position: relative;
            overflow: hidden;
            transition: transform 0.05s linear;
        }
        .tap-target::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.05s linear;
            pointer-events: none;
            z-index: 2;
        }
        .tapped { transform: scale(0.96) !important; }
        .tapped::after { background: rgba(255, 255, 255, 0.4) !important; }

        .container { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            padding: 25px 20px; 
            border-radius: 20px; 
            width: 90%; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            text-align: center; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            margin-bottom: 100px;
        }

        h2 { font-size: 20px; margin-bottom: 20px; color: #4a90e2; }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            color: #4a90e2;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .employee-input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0, 0, 0, 0.25);
            color: white;
            font-size: 20px;
            text-align: center;
            letter-spacing: 3px;
        }

        .scan-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1 / 1;
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
        }

        #video { width: 100%; height: 100%; object-fit: cover; display: none; }

        .scan-mask {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(0,255,255,0.7) 50%, transparent 60%);
            background-size: 100% 400%;
            animation: scanMove 1.8s linear infinite;
            box-shadow: 0 0 25px rgba(0,255,255,0.8);
            display: none;
        }

        @keyframes scanMove { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }

        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            z-index: 10;
        }

        .loading-spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #4a90e2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .result-container {
            margin: 15px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            min-height: 60px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }
        .btn-green { background: rgba(76, 175, 80, 0.9); }
        .btn-red { background: rgba(244, 67, 54, 0.9); }
        .btn-blue { background: rgba(74, 144, 226, 0.9); }

        .status-msg {
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
        }
        .status-error { background: rgba(244,67,54,0.2); color: #ff6b6b; }
        .status-success { background: rgba(76,175,80,0.2); color: #4caf50; }
    </style>
</head>
<body>
    <div class="top-padding-spacer"></div>

    <div class="container">
        <h2><i class="fas fa-clipboard-check"></i> 課堂掃碼簽到</h2>

        <!-- 工號輸入區 -->
        <div class="input-group">
            <div class="input-label">請輸入您的8位員工工號</div>
            <input type="text" id="employeeId" class="employee-input tap-target" 
                   placeholder="例如: 82192660" maxlength="8" inputmode="numeric">
        </div>

        <button class="btn btn-blue tap-target" id="verifyBtn" onclick="verifyEmployee()">
            <i class="fas fa-check"></i> 驗證工號
        </button>

        <!-- 掃碼區域（驗證通過後顯示） -->
        <div id="scanSection" style="display: none;">
            <div class="scan-container" id="scanArea">
                <video id="video" autoplay playsinline muted></video>
                <div class="scan-mask" id="scanMask"></div>
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="loading-spinner"></div>
                </div>
            </div>

            <button class="btn btn-green tap-target" id="startScanBtn" onclick="startCamera()">
                <i class="fas fa-camera"></i> 開始掃描 QR Code
            </button>

            <button class="btn btn-red tap-target" id="stopScanBtn" style="display:none;" onclick="stopCamera()">
                <i class="fas fa-stop"></i> 停止掃描
            </button>
        </div>

        <div class="result-container" id="resultContainer" style="display: none;"></div>

        <button class="btn btn-blue tap-target" onclick="window.location.href='menu02.html'">
            <i class="fas fa-arrow-left"></i> 返回選單
        </button>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item tap-target"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="alerts.html" class="nav-item tap-target"><i class="fas fa-bell"></i><span>Alerts</span></a>
        <a href="menu02.html" class="nav-item active tap-target"><i class="fas fa-th-large"></i><span>Menu</span></a>
        <a href="about.html" class="nav-item tap-target"><i class="fas fa-info-circle"></i><span>About</span></a>
    </nav>

    <script>
        const API_URL = ''; // 相對路徑
        let currentEmployeeId = '';
        let stream = null;
        let scanInterval = null;
        let video = document.getElementById('video');
        let scanMask = document.getElementById('scanMask');
        let loadingOverlay = document.getElementById('loadingOverlay');

        function applyTapEffect() {
            document.querySelectorAll('.tap-target').forEach(btn => {
                btn.addEventListener('touchstart', () => btn.classList.add('tapped'), { passive: true });
                const remove = () => setTimeout(() => btn.classList.remove('tapped'), 100);
                btn.addEventListener('touchend', remove);
                btn.addEventListener('touchcancel', remove);
            });
        }

        // 驗證工號
        async function verifyEmployee() {
            const employeeId = document.getElementById('employeeId').value.trim();
            const resultContainer = document.getElementById('resultContainer');

            if (employeeId.length !== 8 || !/^\d+$/.test(employeeId)) {
                resultContainer.innerHTML = `<div class="status-msg status-error">工號必須為8位數字</div>`;
                resultContainer.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/checkin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_id: employeeId })
                });

                const data = await res.json();

                if (data.success) {
                    currentEmployeeId = employeeId;
                    document.getElementById('verifyBtn').style.display = 'none';
                    document.getElementById('scanSection').style.display = 'block';
                    resultContainer.innerHTML = `<div class="status-msg status-success">工號驗證成功！歡迎 ${employeeId}</div>`;
                    resultContainer.style.display = 'block';
                } else {
                    resultContainer.innerHTML = `<div class="status-msg status-error">${data.message}</div>`;
                    resultContainer.style.display = 'block';
                }
            } catch (e) {
                resultContainer.innerHTML = `<div class="status-msg status-error">網路錯誤，請稍後再試</div>`;
                resultContainer.style.display = 'block';
            }
        }

        async function startCamera() {
            loadingOverlay.style.display = 'flex';
            document.getElementById('startScanBtn').style.display = 'none';

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } }
                });
                video.srcObject = stream;
                await video.play();

                video.style.display = 'block';
                scanMask.style.display = 'block';
                loadingOverlay.style.display = 'none';
                document.getElementById('stopScanBtn').style.display = 'block';

                scanInterval = setInterval(scanQR, 150);
            } catch (err) {
                loadingOverlay.style.display = 'none';
                document.getElementById('startScanBtn').style.display = 'block';
                alert("無法開啟攝像頭，請確認權限");
            }
        }

        function stopCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            video.style.display = 'none';
            scanMask.style.display = 'none';
            document.getElementById('stopScanBtn').style.display = 'none';
            document.getElementById('startScanBtn').style.display = 'block';
            if (scanInterval) clearInterval(scanInterval);
        }

        function scanQR() {
            if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);

            if (code) {
                stopCamera();
                const resultContainer = document.getElementById('resultContainer');
                resultContainer.innerHTML = `<div class="status-msg status-success">掃描成功！正在簽到...</div>`;
                resultContainer.style.display = 'block';

                // 執行簽到
                performCheckIn(code.data);
            }
        }

        async function performCheckIn(qrData) {
            try {
                const res = await fetch(`${API_URL}/checkin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_id: currentEmployeeId })
                });

                const data = await res.json();

                const resultContainer = document.getElementById('resultContainer');
                if (data.success) {
                    resultContainer.innerHTML = `<div class="status-msg status-success">簽到成功！<br>歡迎參加課程</div>`;
                    // 可選：幾秒後跳轉到簽到記錄頁面
                    setTimeout(() => {
                        window.location.href = `classsful.html?employee_id=${currentEmployeeId}`;
                    }, 1500);
                } else {
                    resultContainer.innerHTML = `<div class="status-msg status-error">${data.message}</div>`;
                }
            } catch (e) {
                document.getElementById('resultContainer').innerHTML = `<div class="status-msg status-error">簽到失敗，請檢查網路</div>`;
            }
        }

        // 初始化
        window.onload = () => {
            applyTapEffect();
            document.getElementById('employeeId').focus();
        };

        window.addEventListener('beforeunload', stopCamera);
    </script>
</body>
</html>
